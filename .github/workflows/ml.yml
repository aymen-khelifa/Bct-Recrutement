name: Deploy Python ML Service to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'backend/src/main/resources/python/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate requirements.txt
        run: |
          cd backend/src/main/resources/python
          python -m pip install --upgrade pip
          pip install --dry-run -r requirements.txt 2>&1 | tail -5

      - name: Prepare deployment package
        run: |
          cd backend/src/main/resources/python
          # Exclure venv, __pycache__, modèles lourds (uploadés manuellement via Kudu)
          zip -r ../../../../../ml_deploy.zip . \
            --exclude "venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "*.pyo" \
            --exclude "audit_face.log" \
            --exclude "models/*" \
            --exclude "chroma_cv/*" \
            --exclude "pairs_bct.csv"
          echo "Package size: $(du -sh ../../../../../ml_deploy.zip)"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_ML_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_ML_WEBAPP_PUBLISH_PROFILE }}
          package: 'ml_deploy.zip'

