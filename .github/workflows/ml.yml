name: Deploy Python ML Service to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'backend/src/main/resources/python/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd backend/src/main/resources/python
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_ML_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_ML_WEBAPP_PUBLISH_PROFILE }}
          package: 'backend/src/main/resources/python'
