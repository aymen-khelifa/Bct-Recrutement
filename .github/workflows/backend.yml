name: Deploy Spring Boot Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: recrutement
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd backend
          mvn clean package -Dmaven.test.skip=true
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3307/recrutement?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root

      - name: Verify JAR integrity
        run: |
          JAR=$(find backend/target -name "*.jar" -not -name "*original*" | head -1)
          echo "Found JAR: $JAR"
          echo "JAR size: $(du -sh $JAR)"
          unzip -t $JAR > /dev/null && echo "JAR is valid" || (echo "JAR is CORRUPTED" && exit 1)
          echo "JAR_PATH=$JAR" >> $GITHUB_ENV

      - name: Package JAR as ZIP for deployment
        run: |
          cp $JAR_PATH backend/target/app.jar
          cd backend/target
          zip -j deployment.zip app.jar

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: 'backend/target/deployment.zip'
