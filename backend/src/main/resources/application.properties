# JWT
jwt.secret=${JWT_SECRET:your_jwt_secret_here_make_sure_it_is_long_enough}
jwt.expiration.ms=3600000
jwt.refresh.expiration.ms=604800000

# Base de donnees
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/recrutement?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.format_sql=true
server.ssl.enabled=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=60000
# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:cloudinary_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:cloudinary_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:cloudinary_api_secret}

# Uploads
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
app.upload.dir=uploads/quiz

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:email@example.com}
spring.mail.password=${MAIL_PASSWORD:email_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Python / ML Scripts
cv.scorer.script=src/main/resources/python/cv_scorer.py
cv.scorer.model.dir=src/main/resources/python/models/bert_bct
flask.face.script=src/main/resources/python/face_verification_service.py
python.executable=src/main/resources/python/venv/Scripts/python.exe

# ML Router & Services
bct.ml.service.url=${BCT_ML_SERVICE_URL:https://recrutement-ml-bbgrckete3cbg0an.francecentral-01.azurewebsites.net}


# OTP
otp.expiration.minutes=2
otp.max.attempts=10
otp.block.minutes=2

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.bct.recrutement.security.JwtService=WARN
logging.level.com.bct.recrutement.config.JwtAuthenticationFilter=WARN
logging.level.com.bct.recrutement.config.JwtUtils=WARN
logging.level.org.springframework.scheduling=WARN
logging.level.org.springframework.aop=WARN

# Configuration générale
app.base-url=${APP_BASE_URL:http://localhost:3000}
spring.websocket.path=/ws

# Groq / OpenRouter
groq.api.key=${GROQ_API_KEY:placeholder-groq-key}

